name: tests

on:
  push:
    branches: [main]
    paths:
      - '**.php'
      - 'phpunit.xml.dist'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.php'
      - 'phpunit.xml.dist'
      - '.github/workflows/tests.yml'

jobs:
    run-tests:
        runs-on: ubuntu-latest
        services:
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        strategy:
            fail-fast: false
            matrix:
                php: [8.5, 8.4]

        name: P${{ matrix.php }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none
                  extensions: redis

            - name: Install dependencies
              uses: "ramsey/composer-install@v3"

            - name: Install Predis
              run: composer require predis/predis --no-interaction --no-progress

            - name: Execute tests
              run: composer test
